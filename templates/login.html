{% extends "base.html" %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-200px)] py-12 px-4">
    <div class="w-full max-w-md bg-white rounded-lg shadow-lg border border-outline-variant p-8">
        <div class="text-center mb-8">
            <h1 class="font-headline-lg text-2xl text-on-surface mb-2">Iniciar Sesión</h1>
            <p class="text-on-surface-variant text-label-md">Accede a tu cuenta TiendaPOO</p>
        </div>
        
        <form action="{{ url_for('main.login') }}" method="POST" class="space-y-6">
            <!-- Email Input -->
            <div>
                <label for="correo" class="block font-label-md text-on-surface mb-2">Correo Electrónico</label>
                <input type="email" id="correo" name="correo" required
                       class="w-full px-4 py-3 border border-outline-variant rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-container transition-all"
                       placeholder="tu@correo.com">
            </div>
            
            <!-- Password Input -->
            <div>
                <label for="contrasena" class="block font-label-md text-on-surface mb-2">Contraseña</label>
                <input type="password" id="contrasena" name="contrasena" required
                       class="w-full px-4 py-3 border border-outline-variant rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-container transition-all"
                       placeholder="••••••••">
            </div>
            
            <!-- Remember & Forgot -->
            <div class="flex justify-between items-center text-label-md">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="w-4 h-4 rounded border-outline-variant">
                    <span class="text-on-surface-variant">Recuérdame</span>
                </label>
                <a href="#" class="text-primary hover:text-primary-container transition-colors">¿Olvidaste contraseña?</a>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="w-full bg-primary-container text-on-primary-container py-3 rounded-lg font-label-md font-bold hover:opacity-90 transition-all active:scale-95">
                Ingresar
            </button>
        </form>
        
        <!-- Register Link -->
        <div class="text-center mt-6 pt-6 border-t border-outline-variant">
            <p class="text-on-surface-variant text-label-md">
                ¿No tienes cuenta?
                <a href="{{ url_for('main.registro') }}" class="text-primary font-bold hover:text-primary-container transition-colors">
                    Regístrate aquí
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
